<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Soundscape NYC — Content Manager</title>
</head>
<body>
  <script>window.CMS_MANUAL_INIT = true;</script>
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
  <script>
    const { initCMS } = window;
    const isLocal = window.location.hostname === 'localhost';
    initCMS({
      config: {
        load_config_file: false,
        local_backend: isLocal
          ? { url: "http://localhost:8081/api/v1" }
          : false,
        backend: { name: "git-gateway", branch: "main" },
        media_folder: "assets",
        public_folder: "assets",
        collections: [
          {
            name: "gear",
            label: "Gear Catalog",
            label_singular: "Gear Item",
            folder: "data/gear",
            create: true,
            delete: true,
            extension: "json",
            format: "json",
            slug: "{{id}}",
            identifier_field: "id",
            fields: [
              { label: "ID", name: "id", widget: "string" },
              { label: "Name", name: "name", widget: "string" },
              { label: "Category", name: "category", widget: "select", options: ["backline","standalone","speakers","medium","arrays","booths","lighting","microphones","co2","monitors"] },
              { label: "Daily Rate", name: "price", widget: "number", value_type: "int", min: 0 },
              { label: "Stock Qty", name: "stock", widget: "number", value_type: "int", min: 0 },
              { label: "Image", name: "image", widget: "image" },
              { label: "Description", name: "desc", widget: "text" },
              { label: "Unit", name: "unit", widget: "select", options: ["", "unit", "set", "panel"], required: false },
              { label: "Tag", name: "tag", widget: "string", required: false },
              { label: "Quote Only", name: "isQuoteRequired", widget: "boolean", required: false, default: false }
            ]
          },
          {
            name: "packages",
            label: "Rig Packages",
            label_singular: "Package",
            folder: "data/packages",
            create: true,
            delete: true,
            extension: "json",
            format: "json",
            slug: "{{id}}",
            identifier_field: "id",
            fields: [
              { label: "ID", name: "id", widget: "string" },
              { label: "Name", name: "name", widget: "string" },
              { label: "Price", name: "price", widget: "number", value_type: "int" },
              { label: "Capacity", name: "capacity", widget: "string" },
              { label: "Image", name: "image", widget: "image" },
              { label: "Featured", name: "featured", widget: "boolean", default: false, required: false },
              { label: "Features", name: "features", widget: "list", fields: [
                { label: "Text", name: "text", widget: "string" }
              ]},
              { label: "Raw Items", name: "rawItems", widget: "list", fields: [
                { label: "Name", name: "name", widget: "string" },
                { label: "Qty", name: "qty", widget: "number", value_type: "int" }
              ]}
            ]
          }
        ]
      }
    });
  </script>
</body>
</html>
